version: "2"
sql:
  - name: "dbgen"
    engine: "mysql"
    queries: "internal/infra/repositories/mysqlrepo/internal/queries"
    schema: "./build/migrations"
    gen:
      go:
        sql_package: database/sql
        package: "dbgen"
        out: "internal/infra/repositories/mysqlrepo/internal/dbgen"
        emit_interface: false
        emit_json_tags: false
        emit_prepared_queries: false
        emit_empty_slices: true
        emit_exported_queries: true
        emit_pointers_for_null_types: false
        emit_db_tags: true
        overrides:
          - db_type: "binary(16)"
            go_type: "github.com/jictyvoo/amigonimo_api/internal/entities.HexID"
